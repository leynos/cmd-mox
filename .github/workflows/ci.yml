name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux QA
            run-windows-smoke: false
          - os: windows-latest
            label: Windows smoke
            run-windows-smoke: true
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so `cs-coverage check` can reach the pull
          # request's merge base.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Install CLI tools
        if: matrix.run-windows-smoke == false
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2

      - name: Install make
        if: matrix.run-windows-smoke
        shell: pwsh
        run: choco install make --no-progress -y

      - name: Validate Makefile
        if: matrix.run-windows-smoke == false
        run: mbake validate Makefile

      - name: Install code
        if: matrix.run-windows-smoke == false
        run: make build

      - name: Check formatting
        if: matrix.run-windows-smoke == false
        run: make check-fmt

      - name: Run ruff
        if: matrix.run-windows-smoke == false
        run: make lint

      - name: Run typechecker
        if: matrix.run-windows-smoke == false
        run: make typecheck

      # Coverage runs on pull requests only. Pushes to main upload their
      # own coverage (and advance the ratchet baseline) via
      # coverage-main.yml, so generating it here as well would duplicate
      # the work and the CodeScene upload for the same commit.
      - name: Generate coverage
        if: matrix.run-windows-smoke == false && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@9f788dad94c848e3bbddfb90f9e80b6742b7390c
        with:
          output-path: coverage.xml
          format: cobertura
          # The suite currently runs serially (the previous slipcover step
          # used pytest-forked without xdist); keep it serial to stay
          # behaviour-preserving. Follow-up 4 removes this pin to adopt
          # pytest-xdist once the suite is confirmed xdist-clean.
          pytest-workers: ''
          with-ratchet: 'true'

      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: matrix.run-windows-smoke == false && env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: cobertura
          mode: check
          project-url: https://api.codescene.io/v2/projects/69277
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}

      - name: Run Windows smoke tests
        if: matrix.run-windows-smoke
        shell: pwsh
        run: make windows-smoke

      - name: Upload IPC logs
        if: matrix.run-windows-smoke && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.0.0
        with:
          name: windows-ipc-logs
          path: windows-ipc.log
          if-no-files-found: warn
